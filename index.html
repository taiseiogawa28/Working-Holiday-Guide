<!DOCTYPE html>
<html lang="en">
    <head>
    <!-- ユーザーには見えない設定部分 -->
        <meta charset="UTF-8"> 
        <!-- 日本語を正しく表示(文字化け防止) -->
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0"> 
        <!-- スマホでも見やすくする設定 -->
        <title>Working Holiday Guide</title> 
        <!-- ブラウザのタブに表示される名前 -->
        <link rel="stylesheet" href="style.css"> VS
        <!-- style.cssの読み込み -->
    </head>
        <body> 
        <!-- 出力画面部分の開始 -->
            <h1>🌎Working Holiday Guide<br>
                - For Japanese -
            </h1>  <!-- hは見出しheading -->
            <h2>Pre-arrival Tasks</h2>  <!-- 中見出し -->
            
            <p id="progress-text">Progress: 0%</p> <!-- Progress : 0%を表示、id="progress-text"は、このpタグへの名づけで、理由はJavaScriptから探すため-->
            
            <div class="progress-container">   <!--　divで箱を設置　-->
                <div id="progress-bar"></div>  <!-- さらに内側に箱、これを進捗バーとして利用する -->
            </div>

            <ul> <!-- リスト開始(箇条書き) -->
                <li> <!-- リストの項目 -->
                    <input type="checkbox" class="task"> <!-- チェックボックスの出力 -->
                    Apply for Visa <!-- そのまま表示 -->
                </li>
                <li>
                    <input type="checkbox" class="task">
                    Buy Flight Ticket
                </li>
                <li>
                    <input type="checkbox" class="task">
                    Arrange Accommodation
                </li>
                <li>
                    <input type="checkbox" class="task">
                    Prepare Resume
                </li>
            </ul>
            <!-- リスト(箇条書き終了) --> 
            
           
            <h2>Post-Arrival</h2>
            <ul>
                <li>
                    <input type="checkbox" class = "task">
                    Open Bank Account
                </li>
                <li>
                    <input type="checkbox" class = "task">
                    Apply for IRD Number
                </li>
                <li>
                    <input type="checkbox" class = "task">
                    Buy SIM Card
                </li>
                <li>
                    <input type="checkbox" class = "task">
                    Find a Job
                </li>
            </ul>     
            
            <script src="script.js"></script>  <!--　JavaScriptを読み込む -->

        </body>
        <!-- 画面部分終了 -->
</html>
